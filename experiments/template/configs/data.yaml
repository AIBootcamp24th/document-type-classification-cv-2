data:
  image_col: ID
  label_col: target
  num_workers: 0
  pin_memory: false
  persistent_workers: false

image:
  size: 224     # 모델 input 크기 설정
  channels: 3
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

split:
  method: stratified_kfold
  n_splits: 5
  shuffle: true
  random_state: 42

augmentation:
  train:
    resize:
      height: 224
      width: 224

    horizontal_flip:
      p: 0.5

    random_brightness_contrast:
      p: 0.3
      brightness_limit: 0.2
      contrast_limit: 0.2

    affine:
      p: 0.2
      translate_percent: 0.05
      scale_limit: 0.1
      rotate_limit: 15

    gaussian_blur:
      p: 0.2
      blur_limit: [3, 7]

    gauss_noise:
      p: 0.2
      var_limit: [10.0, 50.0]

    color_jitter:
      p: 0.3
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
      hue: 0.1

    random_rotate_90:
      p: 0.3

    perspective:
      p: 0.2
      scale: [0.05, 0.1]

    clahe:
      p: 0.2
      clip_limit: 4.0
      tile_grid_size: [8, 8]

    sharpen:
      p: 0.2
      alpha: [0.2, 0.5]
      lightness: [0.5, 1.0]

    grid_distortion:
      p: 0.2
      num_steps: 5
      distort_limit: 0.3

    normalize:
      p: 1.0

    to_tensor:
      p: 1.0

  valid:
    resize:
      height: 224
      width: 224

    normalize:
      p: 1.0

    to_tensor:
      p: 1.0

  test:
    resize:
      height: 224
      width: 224

    normalize:
      p: 1.0

    to_tensor:
      p: 1.0