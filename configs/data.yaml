data:
  image_col: ID
  label_col: target
  num_workers: 0
  pin_memory: false
  persistent_workers: false

image:
  size: 224     # 모델 input 크기 설정
  channels: 3
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

split:
  method: stratified     # stratified로 클래스 불균형 대응
  valid_ratio: 0.2
  shuffle: true
  random_state: 42
  stratify: true

augmentation:
  train:
    resize:
      height: 224
      width: 224

    horizontal_flip:
      p: 0.5

    random_brightness_contrast:
      p: 0.3
      brightness_limit: 0.2
      contrast_limit: 0.2

    affine:
      p: 0.3
      translate_percent: 0.05
      scale_limit: 0.1
      rotate_limit: 5

    normalize:
      p: 1.0

    to_tensor:
      p: 1.0

  valid:
    resize:
      height: 224
      width: 224

    normalize:
      p: 1.0

    to_tensor:
      p: 1.0

  test:
    resize:
      height: 224
      width: 224

    normalize:
      p: 1.0

    to_tensor:
      p: 1.0